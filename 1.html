<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3 {
            color: red;
            background-color: cyan;
        }

        .internal {
            color: gray;
            background-color: black;
        }
    </style>
</head>

<body>
    <h1 style="color: rgb(255, 21, 0); background-color: rgb(171, 237, 100); border: solid black;">Hi</h1>

    <p
        style="background-color: aqua; color: rgb(68, 0, 128); margin: 30px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        Hello I am Inline css</p>
    <h3>Hello Internal Css</h3>
    <h3 class="internal">Hello Internal Css</h3>
</body>

</html>
